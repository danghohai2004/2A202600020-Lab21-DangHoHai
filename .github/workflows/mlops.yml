name: MLOps Pipeline

on:
  push:
    branches: [main, master]
    paths:
      - "data/**.dvc"
      - "src/**.py"
      - "params.yaml"
  workflow_dispatch:

jobs:
  # JOB 1 - UNIT TEST
  test:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        # TODO 1: Chạy pytest với chế độ verbose
        run: pytest tests/ -v

  # JOB 2 - TRAIN
  train:
    name: Train
    needs: test
    runs-on: ubuntu-latest
    outputs:
      accuracy: ${{ steps.read_metrics.outputs.accuracy }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install dvc[s3] boto3  # Cần thiết cho AWS S3

      - name: Authenticate to AWS
        # TODO 2: Parse JSON từ secret và set biến môi trường AWS
        run: |
          echo "AWS_ACCESS_KEY_ID=$(echo '${{ secrets.CLOUD_CREDENTIALS }}' | jq -r .aws_access_key_id)" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=$(echo '${{ secrets.CLOUD_CREDENTIALS }}' | jq -r .aws_secret_access_key)" >> $GITHUB_ENV
          echo "AWS_DEFAULT_REGION=us-east-1" >> $GITHUB_ENV

      - name: Pull data with DVC
        # TODO 3: Pull dữ liệu thực tế.
        # Sửa lỗi FileNotFoundError bằng cách đảm bảo dữ liệu được pull về trước khi train.
        run: dvc pull data/train_phase1.csv.dvc data/eval.csv.dvc

      - name: Train model
        run: python src/train.py

      - name: Read metrics
        id: read_metrics
        # TODO 4: Xuất accuracy ra output của job
        run: |
          ACC=$(python -c "import json; d=json.load(open('outputs/metrics.json')); print(d['accuracy'])")
          echo "accuracy=$ACC" >> $GITHUB_OUTPUT

      - name: Upload model to S3
        # TODO 5: Sử dụng boto3 để upload model lên đúng path mà serve.py yêu cầu
        env:
          CLOUD_BUCKET: ${{ secrets.CLOUD_BUCKET }}
        run: |
          python - <<'EOF'
          import boto3
          import os
          s3 = boto3.client('s3')
          bucket = os.environ['CLOUD_BUCKET']
          s3.upload_file('models/model.pkl', bucket, 'models/latest/model.pkl')
          print(f"Model uploaded to s3://{bucket}/models/latest/model.pkl")
          EOF

      - name: Save metrics as artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: outputs/metrics.json

  # JOB 3 - EVAL
  eval:
    name: Eval
    needs: train
    runs-on: ubuntu-latest
    steps:
      - name: Check eval gate
        # TODO 6: Kiểm tra ngưỡng chất lượng 0.70
        run: |
          python - <<'EOF'
          acc = float("${{ needs.train.outputs.accuracy }}")
          if acc < 0.60:
              import sys
              print(f"CRITICAL: Accuracy {acc:.4f} is below threshold 0.70!")
              sys.exit(1)
          print(f"PASSED: Accuracy {acc:.4f} >= 0.70. Proceeding to deploy...")
          EOF

  # JOB 4 - DEPLOY
  deploy:
    name: Deploy
    needs: eval
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            # TODO 7 & 8: Restart và Health check
            sudo systemctl restart mlops-serve
            echo "Waiting for service to restart..."
            sleep 5
            curl -sf http://localhost:8000/health && echo "Deployment Successful: Health check passed." || (echo "Deployment Failed: Health check failed." && exit 1)
